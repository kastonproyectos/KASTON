    <!-- El Código de la App envuelto para compilación en caliente -->
    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { jsPDF } = window.jspdf;
        const exchangeRates = {
            USD: 0.00025, // 1 COP a USD
            EUR: 0.00023, // 1 COP a EUR
            COP: 1
        };

        const KASTON_WEIGHT = 12.6; // kg por m2
        const KASTON_UNITS_PER_M2 = 42; // Fijo 42 uds por m2
        const KASTON_UNITS_PER_FT2 = 3.90; // 42 / 10.7639

        const MATERIAL_CONSTANTS = {
            clay: { label: 'Teja de Barro', weight: 44.5, color: '#bd533b' },
            cement: { label: 'Teja de Fibrocemento', weight: 13.0, color: '#8da399' },
            zinc: { label: 'Lámina de Zinc', weight: 4.0, color: '#90a4ae' }
        };

        const formatCurrency = (value, currency = 'COP') => {
            let num = Number(value);
            if (isNaN(num)) return value;
            return num.toLocaleString('es-CO', {
                minimumFractionDigits: currency === 'COP' ? 0 : 2,
                maximumFractionDigits: currency === 'COP' ? 0 : 2
            }).replace(/,/g, '.');
        };

        const calculateMetrics = (m2, materialType = 'clay', currency = 'COP', rates = exchangeRates) => {
            const units = m2 * KASTON_UNITS_PER_M2; // Sin margen de desperdicio 3%
            const selectedMaterial = MATERIAL_CONSTANTS[materialType] || MATERIAL_CONSTANTS.clay;
            const traditionalWeight = m2 * selectedMaterial.weight;
            const kastonWeight = m2 * KASTON_WEIGHT;
            const weightSavedKg = traditionalWeight - kastonWeight;
            const weightSavedTons = weightSavedKg / 1000;

            const T_Kaston_m2 = 85000;
            const TEJA_kaston_todo_Costo = 106623;

            let costOnlyTejaCOP = m2 * T_Kaston_m2;
            let costTodoCostoCOP = m2 * TEJA_kaston_todo_Costo;

            let rate = rates[currency] || 1;
            let finalCostOnlyTeja = costOnlyTejaCOP * rate;
            let finalCostTodoCosto = costTodoCostoCOP * rate;

            const plasticUpcycled = m2 * 11;
            const co2Reduced = m2 * 18.5;

            return {
                units: Math.ceil(units),
                weightSavedTons: Number(weightSavedTons.toFixed(2)),
                finalCost: Number(finalCostOnlyTeja.toFixed(2)),
                finalCostTodoCosto: Number(finalCostTodoCosto.toFixed(2)),
                plasticUpcycled: Number(plasticUpcycled.toFixed(1)),
                co2Reduced: Number(co2Reduced.toFixed(1))
            };
        };

        // Animación del número suave
        function AnimatedNumber({ value, decimals = 0 }) {
            const [current, setCurrent] = useState(value);

            useEffect(() => {
                let frame;
                const speed = 0.15;
                const update = () => {
                    setCurrent(prev => {
                        const diff = value - prev;
                        if (Math.abs(diff) < 0.1) return value;
                        return prev + diff * speed;
                    });
                    frame = requestAnimationFrame(update);
                };
                frame = requestAnimationFrame(update);
                return () => cancelAnimationFrame(frame);
            }, [value]);

            return <span>{current.toFixed(decimals)}</span>;
        }

        function Gauge({ value, max, label, sublabel, color, decimals = 0, suffix = '', prefix = '' }) {
            const size = 160;
            const strokeWidth = 12;
            const radius = (size - strokeWidth) / 2;
            const circumference = radius * 2 * Math.PI;
            const percentage = Math.min((value / max) * 100, 100);
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <div className="flex flex-col items-center relative gap-2">
                    <div className="relative" style={{ width: size, height: size }}>
                        <svg className="w-full h-full transform -rotate-90" width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                            <circle cx={size / 2} cy={size / 2} r={radius} strokeWidth={strokeWidth} stroke="rgba(255,255,255,0.1)" fill="none" />
                            <circle
                                cx={size / 2} cy={size / 2} r={radius}
                                strokeWidth={strokeWidth} stroke={color} fill="none" strokeLinecap="round"
                                style={{
                                    strokeDasharray: circumference,
                                    strokeDashoffset: offset,
                                    transition: 'stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
                                    filter: `drop-shadow(0 0 8px ${color}80)`
                                }}
                            />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span className="text-2xl font-bold tracking-tight text-white drop-shadow-md" style={{ color }}>
                                {prefix}<AnimatedNumber value={value} decimals={decimals} />{suffix}
                            </span>
                            <span className="text-xs text-white/50">{sublabel}</span>
                        </div>
                    </div>
                    <div className="text-sm font-medium tracking-widest text-white/70 uppercase">
                        {label}
                    </div>
                </div>
            );
        }

        function InfoTooltip({ title, description, technicalValue }) {
            const [isVisible, setIsVisible] = useState(false);
            const iconRef = useRef(null);
            const tooltipRef = useRef(null);
            const [position, setPosition] = useState({ top: 0, left: 0, isBelow: false });

            useEffect(() => {
                if (isVisible && iconRef.current) {
                    const rect = iconRef.current.getBoundingClientRect();
                    const topSpace = rect.top;

                    // Defaults
                    let isBelow = false;
                    let top = rect.top - 10; // 10px spacing above the icon

                    // Smart Collision: If less than 150px space above, render BELOW the icon
                    if (topSpace < 150) {
                        isBelow = true;
                        top = rect.bottom + 10;
                    }

                    // Smart Collision: Horizontal Centering & Window Bounds
                    let left = rect.left + (rect.width / 2); // Center of icon
                    const assumedTooltipWidth = 240; // max-w-xs approx width handling

                    if (left - (assumedTooltipWidth / 2) < 20) {
                        left = 20 + (assumedTooltipWidth / 2);
                    } else if (left + (assumedTooltipWidth / 2) > window.innerWidth - 20) {
                        left = window.innerWidth - 20 - (assumedTooltipWidth / 2);
                    }

                    setPosition({ top, left, isBelow });
                }
            }, [isVisible]);

            return (
                <div className="relative inline-block ml-2 mt-1" onMouseEnter={() => setIsVisible(true)} onMouseLeave={() => setIsVisible(false)}>

                                transform: `translate(-50%, ${position.isBelow ? '0' : '-100%'})`,

                            <div className={`absolute left-1/2 transform -translate-x-1/2 border-l-4 border-r-4 border-transparent ${position.isBelow ? 'bottom-[100%] border-b-[8px] border-b-bronze/60' : 'top-full border-t-[8px] border-t-bronze/60'}`}></div>
                        </div>,
                        document.body
                    )}
                </div>
            )
        }

        // TODO: PEGA TUS CREDENCIALES DE SUPABASE AQUÍ
        const SUPABASE_URL = "https://naxvanbiwgwfraxqtsof.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_q4zRxSUyH0uhI9OkCUY8HQ_q7mOeZiM";

        // Inicializar cliente Supabase solo si hay credenciales

        function ProjectsTab({ language, session, projects, onEditProject, onDeleteProject, onQuoteProject, rates }) {

                const fullProj = { ...proj };

                if (editingProject) {
                    setProjects(projects.map(p => p.id === proj.id ? fullProj : p));
                    if (supabase) {
                        try {
                            await supabase.from('projects').update({
                                project_m2: proj.unidad === 'ft2' ? proj.area / 10.764 : proj.area,
                                selected_color: settings.currency,
                                total_weight_saved: proj.plastico_kg / 1000,
                                plastic_upcycled_kg: proj.plastico_kg,
                                estimated_savings_usd: proj.inversion_tejas,
                                client_name: proj.nombre,
                                project_data: JSON.stringify(fullProj)
                            }).eq('id', proj.id).eq('user_id', session?.user?.id);
                        } catch (err) {
                            // Fallback: update without project_data if column doesn't exist
                            await supabase.from('projects').update({
                                project_m2: proj.unidad === 'ft2' ? proj.area / 10.764 : proj.area,
                                selected_color: settings.currency,
                                total_weight_saved: proj.plastico_kg / 1000,
                                plastic_upcycled_kg: proj.plastico_kg,
                                estimated_savings_usd: proj.inversion_tejas,
                                client_name: proj.nombre
                            }).eq('id', proj.id).eq('user_id', session?.user?.id);
                        }
                    }
                    setEditingProject(null);
                } else {
                    setProjects([fullProj, ...projects]);
                    if (supabase) {
                        try {
                            await supabase.from('projects').insert([{
                                id: proj.id,
                                user_id: session?.user?.id,
                                project_m2: proj.unidad === 'ft2' ? proj.area / 10.764 : proj.area,
                                selected_color: settings.currency,
                                total_weight_saved: proj.plastico_kg / 1000,
                                plastic_upcycled_kg: proj.plastico_kg,
                                estimated_savings_usd: proj.inversion_tejas,
                                client_name: proj.nombre,
                                project_data: JSON.stringify(fullProj),
                                created_at: new Date().toISOString()
                            }]);
                        } catch (err) {
                            // Fallback: insert without project_data if column doesn't exist
                            await supabase.from('projects').insert([{
                                id: proj.id,
                                user_id: session?.user?.id,
                                project_m2: proj.unidad === 'ft2' ? proj.area / 10.764 : proj.area,
                                selected_color: settings.currency,
                                total_weight_saved: proj.plastico_kg / 1000,
                                plastic_upcycled_kg: proj.plastico_kg,
                                estimated_savings_usd: proj.inversion_tejas,
                                client_name: proj.nombre,
                                created_at: new Date().toISOString()
                            }]);
                        }
                    }
                }
                setTimeout(() => {
                    setTriageFlow(null);
                    setCurrentTab('triage');
                }, 100);
            };

            const handleEditProject = (proj) => {
                setSettings({ ...settings, unit: proj.unidad, area: proj.area });
                setTriageFlow(proj.flow);
                setEditingProject(proj);
                setCurrentTab('dashboard');
            };

            const handleDeleteProject = async (id) => {
                if (window.confirm(T[language]?.deleteConfirm || T['es'].deleteConfirm)) {
                    setProjects(projects.filter(p => p.id !== id));
                    if (supabase) {
                        await supabase.from('projects').delete().eq('id', id);
                    }
                }
            };

            const getMailtoLink = (proj) => {
                const targetProj = proj || showSuccess;
                if (!targetProj) return '#';
                const subject = encodeURIComponent(`Cotización - ${targetProj?.tipoConstruccion || 'Proyecto'}`);
                const body = encodeURIComponent(`Nombre de la persona: ${userName}\nCorreo de la persona: ${userEmail}\n\nAdjunto la cotización generada automáticamente por la plataforma KASTON.\n\nPOR FAVOR, ADJUNTE EN ESTE CORREO EL PDF GENERADO DESCARGADO Y LAS IMÁGENES DE REFERENCIA DE LA CONSTRUCCIÓN A COTIZAR.\n\nDetalles del proyecto:\n- Nombre: ${targetProj?.nombre}\n- Tipo de construcción: ${targetProj?.tipoConstruccion}\n- Área: ${targetProj?.area} ${targetProj?.unidad}\n- Inversión estimada: $${targetProj?.inversion_tejas?.toLocaleString()} ${targetProj?.divisa}`);
                return `mailto:kaston.proyectos@gmail.com?subject=${subject}&body=${body}`;
            };

            const handleQuoteProject = (proj) => {
                window.location.href = getMailtoLink(proj);
            };

            const handleLanguageChange = (langVal) => {
                setLanguage(langVal);
                localStorage.setItem('kastonLang', langVal);
                document.documentElement.lang = langVal;
            };

            useEffect(() => {
                const savedLang = localStorage.getItem('kastonLang') || 'es';
                setLanguage(savedLang);
                document.documentElement.lang = savedLang;
            }, []);

            // Load projects from Supabase when session changes
            useEffect(() => {
                if (session && supabase) {
                    supabase
                        .from('projects')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .then(({ data, error }) => {
                            if (data && !error) {
                                const loaded = data.map(p => {
                                    // Try to restore full project from project_data JSON
                                    if (p.project_data) {
                                        try { return JSON.parse(p.project_data); } catch (e) { }
                                    }
                                    // Fallback: reconstruct from individual columns
                                    return {
                                        id: p.id,
                                        nombre: p.client_name || 'Sin nombre',
                                        area: p.project_m2 || 0,
                                        unidad: 'm2',
                                        inversion_tejas: p.estimated_savings_usd || 0,
                                        plastico_kg: p.plastic_upcycled_kg || 0,
                                        divisa: p.selected_color || 'COP',
                                        material: 'Lámina de Zinc',
                                        tipoConstruccion: 'zinc',
                                        inclinacion: 15,
                                        flow: 'A',
                                        tasas: null
                                    };
                                });
                                setProjects(loaded);
                            }
                        })
                        .catch(console.error);
                } else if (!session) {
                    setProjects([]);
                }
            }, [session]);

            // Prioritize triage upon login
            const prevSession = React.useRef(null);
            React.useEffect(() => {
                if (session && !prevSession.current) {
                    // User just logged in
                    setCurrentTab('triage');
                    setTriageFlow(null);
                }
                prevSession.current = session;
            }, [session]);



            const t = T[language] || T['es'];

            return (
                <div className="min-h-screen bg-graphite font-sans flex flex-col items-center pb-24">
                    <header className="w-full border-b border-white/10 sticky top-0 z-50" style={{ backgroundColor: '#0E0E0E' }}>
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                {typeof KASTON_LOGO !== 'undefined' ? (
                                    <img src={KASTON_LOGO} alt="KASTON" className="h-16 w-auto object-contain" style={{ imageRendering: 'auto', maxHeight: '64px' }} />
                                ) : (
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded bg-bronze text-[#0D0D0D] flex items-center justify-center font-bold shadow-[0_0_15px_rgba(193,138,104,0.5)]">
                                            K
                                        </div>
                                        <h1 className="text-xl font-bold tracking-wider">KASTON</h1>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-sm font-medium text-white/50 tracking-widest flex items-center gap-2 relative z-50">
                                    <div className="flex bg-transparent border border-white/20 rounded-full overflow-hidden">
                                        <button onClick={() => handleLanguageChange('es')} className={`px-3 py-1 transition-colors cursor-pointer ${language === 'es' ? 'bg-bronze text-graphite font-bold' : 'text-white/50 hover:text-white'}`}>ES</button>
                                        <button onClick={() => handleLanguageChange('en')} className={`px-3 py-1 transition-colors cursor-pointer ${language === 'en' ? 'bg-bronze text-graphite font-bold' : 'text-white/50 hover:text-white'}`}>EN</button>
                                    </div>
                                </div>
                                {session && (
                                    <button onClick={() => { onLogout(); setCurrentTab('profile'); }} className="text-xs text-white/30 hover:text-bronze uppercase tracking-widest transition-colors cursor-pointer border border-white/10 hover:border-bronze px-3 py-1 rounded">
                                        {t.logout}
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="w-full flex-grow flex flex-col items-center py-10 px-4 md:px-6">
                        {currentTab === 'triage' && <TriageScreen language={language} onSelectFlow={(flow) => {
                            setTriageFlow(flow);
                            setCurrentTab('dashboard');
                        }} />}
                        {currentTab === 'dashboard' && <CalculatorTab language={language} defaults={settings} onSaveProject={handleSaveProject} editingProject={editingProject} defaultFlow={triageFlow || 'A'} session={session} setCurrentTab={setCurrentTab} rates={rates} />}
                        {currentTab === 'projects' && (
                            session ? <ProjectsTab language={language} session={session} projects={projects} onEditProject={handleEditProject} onDeleteProject={handleDeleteProject} onQuoteProject={handleQuoteProject} rates={rates} /> :
                                <div className="w-full flex-grow flex flex-col items-center justify-center p-8 mt-20 text-center animate-fade-in"><p className="text-white/50 tracking-widest uppercase mb-6 text-sm">{t.authReq}</p><h2 className="text-2xl font-bold text-white mb-8 border-b border-white/10 pb-4">{t.loginToView}</h2><button onClick={() => setCurrentTab('profile')} className="bg-bronze hover:bg-white text-graphite px-8 py-4 rounded-xl font-bold uppercase tracking-widest transition-colors cursor-pointer shadow-[0_0_20px_rgba(193,138,104,0.3)]">{t.goToProfile}</button></div>
                        )}
                        {currentTab === 'profile' && (
                            session ? <ProfileTab language={language} settings={settings} updateSettings={(newSets) => setSettings({ ...settings, ...newSets })} session={session} extraData={extraData} /> :
                                <AuthScreen language={language} onAuth={onAuth} />
                        )}
                    </main>

                    {/* Bottom Tab Bar */}
                    <div className="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/10 p-2 z-50 flex justify-center pb-safe" style={{ boxShadow: '0 -10px 30px rgba(0,0,0,0.5)' }}>
                        <div className="max-w-md w-full flex justify-around items-center">
                            <button onClick={() => { setCurrentTab('triage'); setTriageFlow(null); }} className={`bottom-nav-btn flex flex-col items-center justify-center p-3 min-w-[6.5rem] w-auto rounded-lg transition-colors duration-300 min-h-[56px] ${currentTab === 'triage' || currentTab === 'dashboard' ? 'text-bronze' : 'text-white/40 hover:text-white/70'}`}>
                                <svg className="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                                <span className="text-[10px] uppercase font-bold tracking-widest">{t.bottomDash}</span>
                            </button>
                            <button onClick={() => setCurrentTab('projects')} className={`bottom-nav-btn flex flex-col items-center justify-center p-3 min-w-[6.5rem] w-auto rounded-lg transition-colors duration-300 relative min-h-[56px] ${currentTab === 'projects' ? 'text-bronze' : 'text-white/40 hover:text-white/70'}`}>
                                <svg className="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                                <span className="text-[10px] uppercase font-bold tracking-widest">{t.bottomProj}</span>
                                {projects.length > 0 && <span className="absolute top-2 right-4 bg-greenNeon border border-graphite w-2 h-2 rounded-full"></span>}
                            </button>
                            <button onClick={() => setCurrentTab('profile')} className={`bottom-nav-btn flex flex-col items-center justify-center p-3 min-w-[6.5rem] w-auto rounded-lg transition-colors duration-300 min-h-[56px] ${currentTab === 'profile' ? 'text-bronze' : 'text-white/40 hover:text-white/70'}`}>
                                <svg className="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                <span className="text-[10px] uppercase font-bold tracking-widest">{t.bottomProf}</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthScreen({ onAuth, language }) {
            const t = T[language] || T['es'];
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [fullName, setFullName] = useState('');
            const [phone, setPhone] = useState('');
            const [role, setRole] = useState('Propietario');
            const [idType, setIdType] = useState('Cédula de Ciudadanía');
            const [idNumber, setIdNumber] = useState('');
            const [profilePhoto, setProfilePhoto] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [confirmMsg, setConfirmMsg] = useState(null);

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setProfilePhoto(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setPhotoPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(null);
                setConfirmMsg(null);
                if (!isLogin && !profilePhoto) { setError(t.errPhotoReq); return; }
                if (!isLogin && !fullName.trim()) { setError(t.errNameReq); return; }
                if (!isLogin && !phone.trim()) { setError(t.errPhoneReq); return; }
                if (!isLogin && !idNumber.trim()) { setError(t.errIdReq); return; }

                // Identity String Validation Enforcement
                if (!isLogin) {
                    if (idType === 'Pasaporte') {
                        if (!/^[a-zA-Z]{2}\d+$/.test(idNumber)) {
                            setError(t.errPassportFmt);
                            return;
                        }
                    } else {
                        // Cédula, NIT, CE validation (Only numbers)
                        if (!/^\d+$/.test(idNumber)) {
                            setError(`${t.errDocPre} ${idType} ${t.errDocSuf}`);
                            return;
                        }
                    }
                }

                setLoading(true);
                try {

                    if (isLogin) {
                        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        onAuth(data.session, {});
                    } else {
                        // Upload image Logic simulation (Using Base64 due to Local approach)
                        const storePhotoInDB = photoPreview; // Uses already prepared Base64 string from handler

                        const { data, error } = await supabase.auth.signUp({
                            email,
                            password,
                            options: {
                                data: {
                                    full_name: fullName,
                                    phone: phone,
                                    role: role,
                                    id_type: idType,
                                    id_number: idNumber,
                                    photoPreview: storePhotoInDB // Persisting Base64 string directly into metadata!
                                }
                            }
                        });
                        if (error) throw error;
                        if (data.session) {
                            onAuth(data.session, { fullName, phone, photoPreview, role, idType, idNumber });
                        } else {
                            setConfirmMsg(t.awaitConfirm);
                        }
                    }
                } catch (err) {
                    setError(err.message === 'Invalid login credentials' ? t.errBadCreds : err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4" style={{ backgroundColor: '#0E0E0E' }}>
                    <div className="p-8 rounded-2xl w-full max-w-md border border-white/10 shadow-[0_0_30px_rgba(193,138,104,0.15)] relative overflow-hidden" style={{ backgroundColor: '#0E0E0E' }}>
                        <div className="absolute top-[-50px] right-[-50px] w-40 h-40 bg-bronze rounded-full opacity-10 blur-[50px]"></div>

                        <div className="flex justify-center mb-10 relative z-10">
                            {typeof KASTON_LOGO !== 'undefined' ? (
                                <img src={KASTON_LOGO} alt="KASTON Logo" className="h-28 w-auto object-contain" style={{ imageRendering: 'auto', maxHeight: '112px' }} />
                            ) : (
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded bg-bronze text-[#0D0D0D] flex items-center justify-center font-bold text-2xl shadow-[0_0_15px_rgba(193,138,104,0.5)]">K</div>
                                    <h1 className="text-3xl font-bold tracking-wider text-white">KASTON</h1>
                                </div>
                            )}
                        </div>

                        <h2 className="text-2xl font-semibold tracking-tight text-white mb-6 text-center relative z-10 uppercase">
                            {isLogin ? t.corpAcc : t.techReg}
                        </h2>

                        {error && <div className="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-xl mb-4 text-center mt-2">{error}</div>}
                        {confirmMsg && (
                            <div className="bg-green-500/10 border border-green-500/50 text-green-400 text-sm p-4 rounded-xl mb-4 text-center mt-2 leading-relaxed">
                                {confirmMsg}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="flex flex-col gap-4 relative z-10">
                            {!isLogin && (
                                <>
                                    <div>
                                        <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.fullName}</label>
                                        <input type="text" required value={fullName} onChange={e => setFullName(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner" placeholder={t.fullNPlace} />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.phoneNum} *</label>
                                        <input type="tel" required value={phone} onChange={e => setPhone(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner" placeholder={t.telPlace} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.roleTitle}</label>
                                            <select value={role} onChange={e => setRole(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner">
                                                <option value="Propietario">{t.roleOwner || 'Propietario'}</option>
                                                <option value="Arquitecto">{t.roleArch || 'Arquitecto'}</option>
                                                <option value="Ingeniero">{t.roleEng || 'Ingeniero'}</option>
                                                <option value="Constructor">{t.roleConst || 'Constructor'}</option>
                                                <option value="Instalador">{t.roleInst || 'Instalador'}</option>
                                                <option value="Desarrollador Inmobiliario">{t.roleDev || 'Desarrollador Inmobiliario'}</option>
                                                <option value="Otro">{t.roleOther || 'Otro'}</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.idTypeLabel}</label>
                                            <select value={idType} onChange={e => setIdType(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner">
                                                <option value="Cédula de Ciudadanía">Cédula de C. (CC)</option>
                                                <option value="Cédula de Extranjería">Cédula de E. (CE)</option>
                                                <option value="NIT">NIT</option>
                                                <option value="Pasaporte">Pasaporte</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.idNum} *</label>
                                        <input type="text" required value={idNumber} onChange={e => setIdNumber(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner" placeholder={t.idPlace} />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.profPhoto} *</label>
                                        <div className="flex items-center gap-4">
                                            {photoPreview ? (
                                                <img src={photoPreview} alt="Preview" className="w-16 h-16 rounded-full object-cover border-2 border-bronze shadow-[0_0_10px_rgba(193,138,104,0.3)]" />
                                            ) : (
                                                <div className="w-16 h-16 rounded-full bg-white/5 border border-dashed border-white/20 flex items-center justify-center text-white/30 text-[10px] font-bold">[IMG]</div>
                                            )}
                                            <label className="flex-1 cursor-pointer bg-black/50 border border-white/10 rounded-xl p-3 text-center text-white/50 hover:border-bronze hover:text-white transition-all text-sm">
                                                {profilePhoto ? profilePhoto.name : t.selectImg}
                                                <input type="file" accept="image/*" onChange={handlePhotoChange} className="hidden" />
                                            </label>
                                        </div>
                                        <p className="text-[10px] text-bronze/70 mt-2 uppercase tracking-wider">{t.secWarn}</p>
                                    </div>
                                </>
                            )}
                            <div>
                                <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.emailAdd}</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner" placeholder={t.emailPlace} />
                            </div>
                            <div>
                                <label className="block text-xs text-white/50 uppercase tracking-widest mb-1 font-semibold">{t.passLabel}</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-bronze focus:ring-1 focus:ring-bronze transition-all shadow-inner" placeholder={t.passPlace} />
                            </div>

                            <button type="submit" disabled={loading} className="w-full mt-4 bg-white/5 border border-white/20 hover:border-bronze hover:bg-bronze hover:text-graphite text-white font-bold py-4 rounded-xl uppercase tracking-widest transition-all duration-300 shadow-[0_0_15px_rgba(0,0,0,0.5)] cursor-pointer">
                                {loading ? '...' : (isLogin ? t.enterDash : t.createAcc)}
                            </button>
                            <button type="button" onClick={() => setIsLogin(!isLogin)} className="w-full text-center text-xs text-white/40 hover:text-white transition-colors mt-4 uppercase tracking-widest cursor-pointer">
                                {isLogin ? t.noAcc : t.reqLog}
                            </button>
                        </form>
                    </div>
                </div>
            )
        }

        const T = {
            es: {
                logout: "Salir",
                roleArch: "Arquitecto",
                roleEng: "Ingeniero",
                authReq: "Se requiere autenticación",
                loginToView: "Acceda para ver sus proyectos",
                goToProfile: "Ir a Perfil / Iniciar Sesión",
                bottomDash: "Dashboard",
                bottomProj: "Proyectos",

                awaitConfirm: "Registration successful! Please check your inbox to confirm your account before logging in.",
                selectImg: "Select image",
                svcBannerTitle: "Structural Warning!",
                svcBannerDesc: "KASTON's weight (12.6 kg/m²) exceeds the configured support limit for this simulation. Technical analysis required.",
                svcBannerAction: "kaston.proyectos@gmail.com",
                pdfClientData: "CLIENT DATA",
                pdfClientName: "Name:",
                pdfClientPhone: "Phone:",
                pdfClientDoc: "Document:",
                pdfClientUnreg: "Not registered",
                pdfZincObs1: "TECHNICAL NOTE: Material supply only. The client states they already",
                pdfZincObs2: "have a company to build the certified supporting structure to bear the",
                pdfZincObs3: "12.6 kg/m2 stability mass of the KASTON system. The company's liability",
                pdfZincObs4: "is limited exclusively to the quality and delivery of the net tile supply; KASTON does not",
                pdfZincObs5: "assume warranty or legal responsibility for the stability, design or execution of",
                pdfZincObs6: "structures installed by third parties."
            }
        };

        function App() {
            const [session, setSession] = useState(null);
            const [extraData, setExtraData] = useState({});
            const [loading, setLoading] = useState(true);
            const [authChecked, setAuthChecked] = useState(false);
            const [initLang] = useState(() => localStorage.getItem('kastonLang') || 'es');

            const handleAuth = (sess, extra = {}) => {
                setSession(sess);
                setExtraData(extra);
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (supabase && supabase.auth) {
                        try {
                            const sessionPromise = supabase.auth.getSession();
                            const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 2500));
                            const { data: { session } } = await Promise.race([sessionPromise, timeoutPromise]);
                            setSession(session);
                        } catch (err) {
                            console.error("Supabase Error / Pausado:", err);
                        } finally {
                            setLoading(false);
                            setAuthChecked(true);
                        }

                        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                            setSession(session);
                            setAuthChecked(true);
                        });
                        return subscription;
                    } else {
                        setLoading(false);
                        setAuthChecked(true);
                        return null;
                    }
                };

                let sub = null;
                initAuth().then(s => sub = s);

                return () => {
                    if (sub) sub.unsubscribe();
                };
            }, []);

            if (loading || !authChecked) {
                return (
                    <div className="min-h-screen bg-graphite flex flex-col items-center justify-center gap-6">
                        <div className="w-16 h-16 rounded-full border-4 border-bronze border-t-transparent animate-spin"></div>
                        <p className="text-bronze uppercase tracking-widest font-bold text-sm">
                            {initLang === 'en' ? 'Initializing...' : 'Inicializando...'}
                        </p>
                    </div>
                );
            }

            return <MainDashboard session={session} extraData={extraData} onLogout={() => { if (supabase) supabase.auth.signOut(); setSession(null); setExtraData(null); }} onAuth={handleAuth} />;
        }

        function TriageScreen({ language, onSelectFlow }) {
            const t = T[language] || T['es'];
            return (
                <div className="w-full flex-grow flex flex-col justify-start md:justify-center relative overflow-x-hidden overflow-y-auto pb-12">
                    <div className="absolute top-[-100px] right-[-100px] w-96 h-96 bg-bronze rounded-full opacity-10 blur-[150px] pointer-events-none"></div>
                    <div className="absolute bottom-[-100px] left-[-100px] w-96 h-96 bg-slateBlue rounded-full opacity-10 blur-[150px] pointer-events-none"></div>

                    <div className="max-w-4xl w-full z-10 animate-fade-in flex flex-col items-center pt-8 mb-auto mx-auto pb-8">
                        <div className="mb-10 text-center">
                            {typeof KASTON_LOGO !== 'undefined' ? (
                                <img src={KASTON_LOGO} alt="KASTON" className="h-24 w-auto object-contain mx-auto mb-4" style={{ imageRendering: 'auto', maxHeight: '96px' }} />
                            ) : (
                                <div className="w-16 h-16 rounded bg-bronze text-[#0D0D0D] flex items-center justify-center font-bold text-4xl mx-auto mb-4 shadow-[0_0_20px_rgba(193,138,104,0.5)]">K</div>
                            )}
                            <h1 className="text-3xl font-bold tracking-tight text-white uppercase mt-4 mb-2">{t.trTitle}</h1>
                            <p className="text-white/50 tracking-widest text-sm uppercase">{t.trSub}</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                            <button onClick={() => onSelectFlow('A')} className="glass-panel p-8 text-left rounded-2xl flex flex-col group hover:border-bronze/50 transition-all duration-300 relative overflow-hidden cursor-pointer h-full">
                                <h3 className="text-xl font-bold text-white uppercase tracking-wider mb-2">{t.routeA}</h3>
                                <div className="text-bronze font-bold text-xs uppercase tracking-widest mb-4">{t.routeASub}</div>
                                <p className="text-sm text-white/50 group-hover:text-white/70 transition-colors flex-grow">"{t.routeADesc}"</p>
                            </button>

                            <button onClick={() => onSelectFlow('B')} className="glass-panel p-8 text-left rounded-2xl flex flex-col group hover:border-slateBlue/50 transition-all duration-300 relative overflow-hidden cursor-pointer h-full">
                                <h3 className="text-xl font-bold text-white uppercase tracking-wider mb-2">{t.routeB}</h3>
                                <div className="text-slateBlue font-bold text-xs uppercase tracking-widest mb-4">{t.routeBSub}</div>
                                <p className="text-sm text-white/50 group-hover:text-white/70 transition-colors flex-grow">"{t.routeBDesc}"</p>
                            </button>

                            <a href={`mailto:KASTON.PROYECTOS@GMAIL.COM?subject=${encodeURIComponent(language === 'en' ? 'DO YOU NEED TO CHANGE AND INSTALL A STRUCTURE?' : '¿NECESITA CAMBIAR E INSTALAR ESTRUCTURA?')}&body=${encodeURIComponent(language === 'en' ? 'PLEASE SPECIFY YOUR PROJECT SO WE CAN ADVISE YOU, TELL US ABOUT YOUR CASE AND PROVIDE MEASUREMENTS' : 'ESPECIFIQUENOS SU PROYECTO PARA NOSOTROS ASESORARLOS, CUENTENOS DEL CASO DENOS MEDIDAS')}`} className="glass-panel p-8 text-left rounded-2xl flex flex-col group hover:border-greenNeon/50 transition-all duration-300 relative overflow-hidden cursor-pointer h-full no-underline">
                                <h3 className="text-xl font-bold text-white uppercase tracking-wider mb-2">{t.routeC}</h3>
                                <div className="text-greenNeon font-bold text-xs uppercase tracking-widest mb-4">{t.routeCSub}</div>
                                <p className="text-sm text-white/50 group-hover:text-white/70 transition-colors flex-grow">"{t.routeCDesc}"</p>
                                <div className="mt-4 text-[10px] text-greenNeon/60 uppercase tracking-widest font-bold border-t border-greenNeon/20 pt-3">→ KASTON.PROYECTOS@GMAIL.COM</div>
                            </a>
                        </div>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
